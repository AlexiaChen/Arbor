[advisories]
# Transitive from exact-pinned alloy-primitives 1.6.1. This advisory records
# maintenance status, not a vulnerability, and has no safe upgrade. Remove the
# exception as soon as alloy-primitives removes paste.
ignore = ["RUSTSEC-2024-0436"]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[licenses]
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Zlib",
]

[sources]
unknown-git = "deny"
unknown-registry = "deny"
